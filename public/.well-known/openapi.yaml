openapi: 3.0.0
info:
  title: Saanvi Careers API
  description: Global recruitment agency and career services platform
  version: 1.0.0
  contact:
    email: contact@saanvicareers.com
    url: https://saanvicareers.com
servers:
  - url: https://saanvicareers.com
    description: Production server
paths:
  /job-finder:
    get:
      summary: Find jobs matching your profile
      description: Upload your resume and get matched with relevant job openings across IT, Engineering, Healthcare and Finance sectors globally.
      operationId: findJobs
  /services/career-guidance:
    get:
      summary: Book a career guidance session
      description: Book a 30-minute 1-on-1 career mentorship session with an industry expert for ₹499. Includes career roadmap, resume review, salary tips.
      operationId: careerGuidance
  /services/ats-resume:
    get:
      summary: Build an ATS-optimised resume
      description: Free service to rewrite your resume to bypass ATS filters. Upload PDF or Word, get 3 professional variants instantly.
      operationId: atsResume
  /about:
    get:
      summary: About Saanvi Careers
      description: Learn about Saanvi Careers — India's global recruitment agency with 3,200+ placements across 15+ countries.
      operationId: about
